<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basement Stacks Admin</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 8px;
            width: 300px;
        }
        h1 { font-size: 1.2rem; margin-bottom: 1.5rem; }
        input[type="password"] {
            width: 100%;
            padding: 0.6rem;
            background: #222;
            border: 1px solid #444;
            color: #eee;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.6rem;
            background: #444;
            color: #eee;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #555; }
        .error { color: #e55; font-size: 0.9rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Basement Stacks Admin</h1>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Enter</button>
        </form>
    </div>
</body>
</html>
