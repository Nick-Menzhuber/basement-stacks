<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Basement Stacks</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #111;
            color: #eee;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #1a1a1a;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        header h1 { margin: 0; font-size: 1rem; color: #aaa; }
        header nav a {
            color: #aaa;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.9rem;
        }
        header nav a:hover { color: #eee; }
        main {
            padding: 1.5rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .search-bar input {
            flex: 1;
            padding: 0.6rem;
            background: #222;
            border: 1px solid #444;
            color: #eee;
            border-radius: 4px;
        }
        .search-bar button {
            padding: 0.6rem 1rem;
            background: #444;
            color: #eee;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .search-bar button:hover { background: #555; }
        .result-list { list-style: none; padding: 0; margin: 0; }
        .result-list li {
            padding: 0.75rem;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }
        .result-list li:hover { background: #1a1a1a; }
        .result-list .meta { font-size: 0.8rem; color: #888; margin-top: 0.2rem; }
    </style>
</head>
<body>
    <header>
        <h1>Basement Stacks Admin</h1>
        <nav>
            <a href="/admin">Home</a>
            <a href="/admin/logout">Log out</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
